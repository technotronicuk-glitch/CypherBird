<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypherbird | Secure Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <header class="border-b border-slate-800 sticky top-0 bg-slate-900/90 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg">
                        <i class="fas fa-dove fa-2-xl text-white"></i> 
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-white italic">CYPHER<span class="text-indigo-400">BIRD</span></span>
                </div>

                <nav class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-widest">
                    <a href="#careers" class="hover:text-indigo-400 transition">Careers</a>
                    <a href="#support" class="hover:text-indigo-400 transition">Support</a>
                    <a href="#account" class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full border border-slate-700 hover:bg-slate-700 transition">
                        <i class="fas fa-user-circle"></i> Account
                    </a>
                </nav>

                <div class="md:hidden">
                    <button class="text-slate-300 hover:text-white">
                        <i class="fas fa-bars fa-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="py-24 px-6 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 bg-gradient-to-r from-white to-slate-500 bg-clip-text text-transparent">
                Soar Through the Encrypted Sky.
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-10">
                The next generation of digital sovereignty. Secure, swift, and decentralized.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-lg font-bold transition">
                    Get Started
                </button>
                <button class="bg-slate-800 hover:bg-slate-700 text-white px-8 py-4 rounded-lg font-bold transition">
                    Documentation
                </button>
            </div>
        </section>
    </main>

    <footer class="border-t border-slate-800 py-10 text-center text-slate-500 text-sm">
        <p>&copy; 2026 Cypherbird Project. All rights reserved.</p>
    </footer>

</body>
</html>
