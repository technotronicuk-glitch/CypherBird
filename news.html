<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypherbird | Intelligence Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8f9fa; 
            color: #1a1a1a; 
        }

        .news-card {
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        .news-card:hover { 
            border-color: #3b82f6; 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .shimmer { 
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite; 
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-6xl mx-auto">
        <header class="mb-16 border-b border-zinc-200 pb-10">
            <a href="index.html" class="text-zinc-400 text-[10px] font-bold tracking-[0.3em] uppercase hover:text-blue-600 transition">← Return to Home</a>
            <h1 class="text-5xl font-extrabold tracking-tighter mt-6 text-zinc-900">Threat Intelligence</h1>
            <p class="text-zinc-500 text-sm mt-3 font-light tracking-wide uppercase">Real-time official news from the security frontline.</p>
        </header>

        <div id="news-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="shimmer h-80 w-full rounded-2xl"></div>
            <div class="shimmer h-80 w-full rounded-2xl"></div>
            <div class="shimmer h-80 w-full rounded-2xl"></div>
        </div>

        <footer class="mt-20 text-center opacity-50">
            <p class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold">Feed sourced via official RSS uplink</p>
        </footer>
    </div>

    <script>
        const RSS_FEED_URL = 'https://thehackernews.com/feeds/posts/default';
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_FEED_URL)}`;

        // Function to extract image URL from the article description HTML
        function extractImageUrl(content) {
            const imgRegExp = /<img[^>]+src="([^">]+)"/;
            const match = imgRegExp.exec(content);
            return match ? match[1] : null;
        }

        async function fetchNews() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('news-feed');
                
                if (data.status === 'ok') {
                    container.innerHTML = ''; 
                    
                    data.items.slice(0, 9).forEach(item => {
                        const date = new Date(item.pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        
                        // Try to get image from standard field, then try extracting from content
                        const extractedImg = extractImageUrl(item.content || item.description);
                        const thumbnail = extractedImg || item.thumbnail || `https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800`;

                        const article = `
                            <div class="news-card flex flex-col rounded-2xl transition-all duration-300 overflow-hidden group">
                                <div class="h-48 overflow-hidden bg-zinc-100">
                                    <img src="${thumbnail}" alt="news-image" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                                </div>
                                <div class="p-6 flex flex-col flex-grow">
                                    <div class="flex justify-between items-start mb-3">
                                        <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">${item.categories[0] || 'Intelligence'}</span>
                                        <span class="text-[10px] text-zinc-400 font-mono">${date}</span>
                                    </div>
                                    <h3 class="text-lg font-bold mb-3 text-zinc-900 group-hover:text-blue-600 transition-colors leading-tight">
                                        <a href="${item.link}" target="_blank">${item.title}</a>
                                    </h3>
                                    <p class="text-sm text-zinc-500 line-clamp-3 font-light leading-relaxed mb-6">
                                        ${item.description.replace(/<[^>]*>?/gm, '').substring(0, 120)}...
                                    </p>
                                    <div class="mt-auto">
                                        <a href="${item.link}" target="_blank" class="text-[10px] font-black text-zinc-900 uppercase tracking-widest border-b-2 border-blue-100 hover:border-blue-600 pb-1 transition-all">Read Intel →</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += article;
                    });
                }
            } catch (error) {
                container.innerHTML = '<p class="text-zinc-500">Uplink failed. Please refresh.</p>';
            }
        }

        fetchNews();
    </script>
</body>
</html>
