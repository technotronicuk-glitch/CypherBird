<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cypherbird | Intelligence Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .news-card:hover { border-color: #3b82f6; background-color: #0a0a0a; }
        .shimmer { background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-4xl mx-auto">
        <header class="mb-16 border-b border-zinc-900 pb-10">
            <a href="index.html" class="text-zinc-500 text-[10px] font-bold tracking-[0.3em] uppercase hover:text-white transition">← Return to Terminal</a>
            <h1 class="text-5xl font-extrabold tracking-tighter mt-6">Threat Intelligence</h1>
            <p class="text-zinc-500 text-sm mt-3 font-light tracking-wide">Daily updates on global data breaches, surveillance, and digital vulnerabilities.</p>
        </header>

        <div id="news-feed" class="space-y-6">
            <div class="shimmer h-32 w-full rounded-2xl"></div>
            <div class="shimmer h-32 w-full rounded-2xl"></div>
            <div class="shimmer h-32 w-full rounded-2xl"></div>
        </div>

        <footer class="mt-20 text-center opacity-30">
            <p class="text-[10px] uppercase tracking-widest">Feed provided by Global Security RSS Protocols</p>
        </footer>
    </div>

    <script>
        // Use a free RSS-to-JSON API to fetch live news
        const RSS_FEED_URL = 'https://thehackernews.com/feeds/posts/default';
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_FEED_URL)}`;

        async function fetchNews() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('news-feed');
                
                if (data.status === 'ok') {
                    container.innerHTML = ''; // Clear loading state
                    
                    // Show top 7 articles
                    data.items.slice(0, 7).forEach(item => {
                        const date = new Date(item.pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        
                        const article = `
                            <div class="news-card border border-zinc-900 p-6 rounded-2xl transition-all group">
                                <div class="flex justify-between items-start mb-3">
                                    <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">${item.categories[0] || 'Breach Alert'}</span>
                                    <span class="text-[10px] text-zinc-600 font-mono">${date}</span>
                                </div>
                                <h3 class="text-xl font-bold mb-3 group-hover:text-blue-400 transition-colors leading-tight">
                                    <a href="${item.link}" target="_blank">${item.title}</a>
                                </h3>
                                <p class="text-sm text-zinc-500 line-clamp-2 font-light leading-relaxed mb-4">
                                    ${item.description.replace(/<[^>]*>?/gm, '').substring(0, 150)}...
                                </p>
                                <a href="${item.link}" target="_blank" class="text-[10px] font-black uppercase tracking-widest border-b border-blue-500 pb-1 hover:text-blue-400 transition">Read Full Intel →</a>
                            </div>
                        `;
                        container.innerHTML += article;
                    });
                }
            } catch (error) {
                document.getElementById('news-feed').innerHTML = '<p class="text-zinc-500">Uplink failed. Please refresh the protocol.</p>';
            }
        }

        fetchNews();
    </script>
</body>
</html>
