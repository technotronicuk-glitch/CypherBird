<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Portal Access | Cypherbird</title>
</head>
<body class="bg-[#111111] text-[#dcdcdc] font-sans flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full px-6">
        <div class="text-center mb-10">
            <a href="index.html" class="text-4xl mb-4 inline-block">🦅</a>
            <h1 class="text-2xl font-bold text-white uppercase tracking-tighter">System Access</h1>
            <p class="text-zinc-500 text-sm italic">Identify yourself to the network</p>
        </div>

        <form class="bg-[#1c1c1c] p-8 rounded-2xl border border-[#333333] shadow-2xl space-y-6">
            <div>
                <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 block mb-2">Operator Alias</label>
                <input type="text" placeholder="Username" class="w-full bg-[#111111] border border-[#333333] p-3 rounded focus:border-amber-500 outline-none transition text-white">
            </div>
            <div>
                <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 block mb-2">Passkey</label>
                <input type="password" placeholder="••••••••" class="w-full bg-[#111111] border border-[#333333] p-3 rounded focus:border-amber-500 outline-none transition text-white">
            </div>
            <button class="w-full py-4 bg-white text-black font-bold rounded uppercase tracking-widest text-xs hover:bg-amber-500 transition">
                Initialize Session
            </button>
            <div class="text-center pt-2">
                <a href="index.html" class="text-xs text-zinc-600 hover:text-zinc-400">← Return to Public Terminal</a>
            </div>
        </form>
    </div>

</body>
</html>
