<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Careers | Cypherbird</title>
</head>
<body class="bg-[#111111] text-[#dcdcdc]">

    <nav class="p-6 border-b border-[#333333]">
        <a href="index.html" class="text-2xl">🦅 <span class="font-bold text-white ml-2 uppercase tracking-tighter">Cypherbird</span></a>
    </nav>

    <main class="max-w-4xl mx-auto py-20 px-6">
        <h2 class="text-5xl font-black text-white mb-6 uppercase italic">Join the Nest.</h2>
        <p class="text-zinc-400 mb-12 text-lg">We are looking for ghosts, architects, and visionaries. If you value privacy over fame, you're in the right place.</p>

        <form class="grid md:grid-cols-2 gap-8 bg-[#1c1c1c] p-10 rounded-3xl border border-[#333333]">
            <div class="space-y-6">
                <input type="text" placeholder="Full Name" class="w-full bg-[#111111] border border-[#333333] p-4 rounded focus:border-amber-500 outline-none">
                <input type="email" placeholder="Email Address" class="w-full bg-[#111111] border border-[#333333] p-4 rounded focus:border-amber-500 outline-none">
                <select class="w-full bg-[#111111] border border-[#333333] p-4 rounded focus:border-amber-500 outline-none">
                    <option>Select Role</option>
                    <option>Developer</option>
                    <option>Security Researcher</option>
                    <option>Community Growth</option>
                </select>
            </div>
            <div class="space-y-6 text-center">
                <div class="border-2 border-dashed border-[#333333] rounded-xl p-10 hover:border-amber-500 cursor-pointer transition">
                    <i class="fas fa-cloud-upload-alt text-3xl mb-4 text-zinc-600"></i>
                    <p class="text-xs uppercase tracking-widest text-zinc-500">Upload CV / Portfolio</p>
                </div>
                <button class="w-full py-4 bg-amber-500 text-black font-bold rounded uppercase tracking-widest text-xs hover:bg-amber-400 transition">
                    Submit Application
                </button>
            </div>
        </form>
    </main>

</body>
</html>
